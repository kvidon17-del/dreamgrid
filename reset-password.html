<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — Dream Grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #070918; --bg2: #0c0f24; --surface: rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08); --border-hi: rgba(167,139,250,0.35);
    --text: #ffffff; --muted: rgba(255,255,255,0.45);
    --accent: #7c5cf6; --accent2: #f472b6; --gold: #fbbf24;
    --grad-btn: linear-gradient(135deg,#6d4df0,#9333ea);
    --radius-sm: 10px; --radius: 16px; --radius-lg: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(ellipse at top, var(--bg2), var(--bg));
    color: var(--text); font-family: 'Inter',sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    background: #0f1228; border: 1px solid rgba(167,139,250,0.3);
    border-radius: var(--radius-lg); padding: 40px; width: 100%; max-width: 420px;
  }
  .logo { display: flex; align-items: center; gap: 8px; font-family: 'Sora',sans-serif; font-weight: 800; font-size: 18px; margin-bottom: 28px; text-decoration: none; color: #fff; }
  h1 { font-family: 'Sora',sans-serif; font-size: 22px; font-weight: 800; margin-bottom: 8px; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 26px; line-height: 1.6; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 500; }
  .password-field { position: relative; }
  .form-group input {
    width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06);
    border: 1px solid var(--border); border-radius: var(--radius-sm); color: #fff;
    font-size: 14px; outline: none; font-family: 'Inter',sans-serif; transition: border-color 0.2s;
  }
  .password-field input { padding-right: 44px; }
  .form-group input:focus { border-color: rgba(167,139,250,0.5); }
  .btn-eye { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 16px; cursor: pointer; padding: 8px; opacity: 0.55; }
  .btn-eye:hover { opacity: 1; }
  .btn-submit {
    width: 100%; padding: 14px; background: var(--grad-btn); color: #fff; border: none;
    border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s; margin-top: 8px; font-family: 'Inter',sans-serif;
  }
  .btn-submit:hover { opacity: 0.88; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-msg { margin-top: 16px; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; display: none; }
  .form-msg.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #fca5a5; }
  .form-msg.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .back-link { display: block; text-align: center; margin-top: 20px; font-size: 13px; color: #a78bfa; text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  #invalid-state { display: none; text-align: center; }
  #invalid-state .icon { font-size: 40px; margin-bottom: 16px; }
</style>
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <svg width="20" height="20" viewBox="0 0 30 30" fill="none"><path d="M15 3L18.5 10.5L27 12L21 18L22.5 27L15 23L7.5 27L9 18L3 12L11.5 10.5L15 3Z" fill="url(#lg1)"/><defs><linearGradient id="lg1" x1="3" y1="3" x2="27" y2="27"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/></linearGradient></defs></svg>
    Dream Grid
  </a>

  <div id="form-state">
    <h1>Set a new password</h1>
    <p class="sub">Choose a new password for your account.</p>
    <div class="form-group">
      <label>New password</label>
      <div class="password-field">
        <input type="password" id="new-password" placeholder="Min. 6 characters" autocomplete="new-password">
        <button type="button" class="btn-eye" onclick="togglePw('new-password', this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <label>Confirm new password</label>
      <div class="password-field">
        <input type="password" id="confirm-password" placeholder="Repeat password" autocomplete="new-password">
        <button type="button" class="btn-eye" onclick="togglePw('confirm-password', this)">👁</button>
      </div>
    </div>
    <button class="btn-submit" id="btn-save" onclick="saveNewPassword()">Save new password</button>
    <div class="form-msg" id="form-msg"></div>
  </div>

  <div id="invalid-state">
    <div class="icon">✦</div>
    <h1>This link has expired</h1>
    <p class="sub">Password reset links only work once and expire after a while. Request a new one from the sign-in page.</p>
    <a href="/" class="back-link">← Back to Dream Grid</a>
  </div>
</div>

<script>
const { createClient } = supabase;
const sb = createClient(
  'https://wnbgwonqpjwzdgcngkxi.supabase.co',
  'sb_publishable_hOXpOVD4w7BZURRbVUr75Q_JOpI98X5'
);

let recoveryReady = false;

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY' && session) recoveryReady = true;
});

async function init() {
  // Give Supabase a moment to parse the recovery token from the URL
  await new Promise(r => setTimeout(r, 300));
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    document.getElementById('form-state').style.display = 'none';
    document.getElementById('invalid-state').style.display = 'block';
  }
}

function togglePw(id, btn) {
  const input = document.getElementById(id);
  const isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  btn.textContent = isHidden ? '🙈' : '👁';
}

function showMsg(text, type) {
  const el = document.getElementById('form-msg');
  el.textContent = text;
  el.className = 'form-msg ' + type;
  el.style.display = 'block';
}

async function saveNewPassword() {
  const pw = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;

  if (pw.length < 6) return showMsg('Password must be at least 6 characters.', 'error');
  if (pw !== confirm) return showMsg('Passwords do not match.', 'error');

  const btn = document.getElementById('btn-save');
  btn.disabled = true; btn.textContent = 'Saving...';

  const { error } = await sb.auth.updateUser({ password: pw });

  btn.disabled = false; btn.textContent = 'Save new password';

  if (error) return showMsg(error.message, 'error');

  showMsg('✓ Password updated! Redirecting you to sign in...', 'success');

  // Sign out of the temporary recovery session so the user must log in
  // with their new password rather than being auto-logged-in.
  await sb.auth.signOut();

  setTimeout(() => window.location.href = '/?password_reset=success', 1800);
}

init();
</script>
</body>
</html>
